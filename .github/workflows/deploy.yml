name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Create runtime config
        run: node -e 'const fs = require("fs"); fs.writeFileSync("outputs/ccatalog/config.json", JSON.stringify({ naverMapKey: process.env.NAVER_MAP_KEY || "" }, null, 2));'
        env:
          NAVER_MAP_KEY: ${{ secrets.NAVER_MAP_KEY }}

      - name: Upload static app
        uses: actions/upload-pages-artifact@v3
        with:
          path: outputs/ccatalog

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
