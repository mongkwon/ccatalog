name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Create runtime config
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("fs");
          const config = {
            naverMapKey: process.env.NAVER_MAP_KEY || "",
            supabaseUrl: process.env.SUPABASE_URL || "",
            supabaseAnonKey: process.env.SUPABASE_ANON_KEY || "",
          };
          fs.writeFileSync("outputs/ccatalog/config.json", `${JSON.stringify(config, null, 2)}\n`);
          NODE
        env:
          NAVER_MAP_KEY: ${{ secrets.NAVER_MAP_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload static app
        uses: actions/upload-pages-artifact@v3
        with:
          path: outputs/ccatalog

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
