<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>까탈로그</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="./styles.css?v=20260624-location-reveal" />
    <script defer src="./app.js?v=20260624-location-reveal"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="map-stage" aria-label="까탈로그 맛집 지도">
        <div id="map" class="map-host" aria-label="지도"></div>

        <div id="mockMap" class="mock-map hidden" aria-label="샘플 지도">
          <div class="river"></div>
          <div class="road road-a"></div>
          <div class="road road-b"></div>
          <div class="road road-c"></div>
          <div class="road road-d"></div>
          <div class="road road-e"></div>
          <div class="district district-1">연남</div>
          <div class="district district-2">성수</div>
          <div class="district district-3">을지로</div>
          <div class="district district-4">논현</div>
          <div id="mockPins" class="mock-pins"></div>
        </div>

        <header class="topbar">
          <div class="brand">
            <button
              id="addButton"
              class="brand-add-button"
              type="button"
              title="맛집 추가"
              aria-label="맛집 추가"
              aria-controls="spotDialog"
              aria-expanded="false"
            >
              <span aria-hidden="true">+</span>
            </button>
            <div>
              <h1>까탈로그</h1>
              <p>취향에 엄격한 맛집 지도</p>
            </div>
          </div>
        </header>

        <aside id="restaurantPanel" class="restaurant-panel is-open" aria-label="맛집 목록" aria-hidden="false">
          <div class="panel-meta">
            <strong id="resultCount">0곳</strong>
            <span id="ratingSummary">동메달 0 · 은메달 0 · 금메달 0</span>
          </div>

          <div id="restaurantList" class="restaurant-list"></div>
        </aside>

        <div class="dock-cluster">
          <nav class="bottom-dock" aria-label="등급 필터">
            <span class="dock-indicator" aria-hidden="true"></span>
            <button
              id="filterModeButton"
              class="dock-mode-button"
              type="button"
              title="필터"
              aria-label="필터 보기"
              aria-controls="restaurantPanel"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 7h10M18 7h2M4 12h2M10 12h10M4 17h7M15 17h5" />
                <path d="M14 5v4M8 10v4M13 15v4" />
              </svg>
            </button>
            <button class="dock-filter-button is-active" type="button" data-filter="all">전체</button>
            <button class="dock-filter-button" type="button" data-filter="1">동메달</button>
            <button class="dock-filter-button" type="button" data-filter="2">은메달</button>
            <button class="dock-filter-button" type="button" data-filter="3">금메달</button>
          </nav>
          <div id="searchPanel" class="search-panel" role="search" aria-label="맛집 검색">
            <button
              id="searchToggle"
              class="dock-search-button"
              type="button"
              title="검색"
              aria-label="검색"
              aria-controls="searchInput"
              aria-expanded="false"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m21 21-5-5m2-5a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" />
              </svg>
            </button>
            <div class="search-row" aria-hidden="true">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m21 21-5-5m2-5a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" />
              </svg>
              <input id="searchInput" type="search" placeholder="맛집, 동네, 메뉴" autocomplete="off" tabindex="-1" />
            </div>
          </div>
        </div>

        <article id="selectedCard" class="selected-card hidden" aria-live="polite"></article>
      </section>
    </main>

    <section id="spotDialog" class="modal" role="dialog" aria-labelledby="spotDialogTitle" aria-hidden="true">
      <form id="spotForm" class="modal-card">
        <input type="hidden" id="spotId" name="id" />
        <div class="modal-header">
          <h2 id="spotDialogTitle">맛집 추가</h2>
        </div>

        <div class="form-grid">
          <div class="field span-2 place-field">
            <label for="nameInput">이름</label>
            <div class="place-entry">
              <input id="nameInput" name="name" type="text" required maxlength="40" autocomplete="off" enterkeyhint="search" />
              <button id="placeSearchButton" class="place-search-button" type="button" aria-label="장소 검색">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m21 21-5-5m2-5a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" />
                </svg>
              </button>
            </div>
            <div id="placeResultList" class="place-result-list hidden" aria-live="polite"></div>
          </div>

          <label class="field span-2">
            <span>분류</span>
            <select id="categoryInput" name="category">
              <option>한식</option>
              <option>일식</option>
              <option>중식</option>
              <option>양식</option>
              <option>분식</option>
              <option>카페</option>
              <option>바</option>
              <option>기타</option>
            </select>
          </label>

          <fieldset class="rating-field span-2">
            <legend>등급</legend>
            <label>
              <input type="radio" name="rating" value="1" checked />
              <span>동메달</span>
            </label>
            <label>
              <input type="radio" name="rating" value="2" />
              <span>은메달</span>
            </label>
            <label>
              <input type="radio" name="rating" value="3" />
              <span>금메달</span>
            </label>
          </fieldset>

          <div class="menu-field span-2">
            <span>추천메뉴</span>
            <div class="menu-entry">
              <input id="menuDraftInput" type="text" maxlength="40" placeholder="메뉴명" autocomplete="off" />
              <button id="addMenuButton" class="menu-add-button" type="button" aria-label="메뉴 추가">
                <span aria-hidden="true">+</span>
              </button>
            </div>
            <div id="menuInputList" class="menu-input-list" aria-label="추가된 추천메뉴"></div>
          </div>

          <fieldset class="delivery-field span-2">
            <legend>배달가능여부</legend>
            <label>
              <input type="checkbox" name="deliveryApps" value="baemin" />
              <span>배달의민족</span>
            </label>
            <label>
              <input type="checkbox" name="deliveryApps" value="coupangEats" />
              <span>쿠팡이츠</span>
            </label>
            <label>
              <input type="checkbox" name="deliveryApps" value="yogiyo" />
              <span>요기요</span>
            </label>
          </fieldset>

          <input id="latInput" name="lat" type="hidden" />
          <input id="lngInput" name="lng" type="hidden" />
          <input id="areaInput" name="area" type="hidden" />

          <label class="field span-2">
            <span>메모</span>
            <textarea id="memoInput" name="memo" rows="2" maxlength="180"></textarea>
          </label>
        </div>

        <div class="modal-actions">
          <button class="primary-button" type="submit">저장</button>
        </div>
      </form>
    </section>

  </body>
</html>
